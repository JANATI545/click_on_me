<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Site Drôle 😂</title>


<style>

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}


body {

  font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;

  height: 100dvh;

  overflow: hidden;

  text-align: center;

}



.page {

  display: none;

  flex-direction: column;

  align-items: center;

  justify-content: center;

  gap: 25px;

  width: 100%;

  height: 100dvh;

  padding: 20px;

}



.page.active {

  display: flex;

}



#page1 {

background: linear-gradient(135deg,#74ebd5,#ACB6E5);

}



#page2 {

background:#111;

}



#pageLoading {

background:#000;

color:#0f0;

}



#page3 {

background:linear-gradient(135deg,#ff9a9e,#fad0c4);

}




h1 {

font-size: clamp(1.8rem,6vw,3rem);

color:#222;

animation:bounce 1.5s infinite;

max-width:95%;

}




#page2 h1 {

color:#ff2e63;

font-size:clamp(2rem,8vw,4rem);

text-shadow:0 0 20px #ff2e63;

animation:shake .4s infinite;

}



#pageLoading h1 {

color:#0f0;

}



.emoji-big {

font-size:clamp(3rem,15vw,6rem);

animation:spin 3s linear infinite;

}



#img3 {

font-size:clamp(4rem,18vw,8rem);

}




#loadingBar {

font-family:monospace;

font-size:clamp(1rem,5vw,2.2rem);

letter-spacing:2px;

white-space:pre;

}




button {

font-size:clamp(1rem,5vw,1.5rem);

padding:15px 35px;

border:none;

border-radius:50px;

background:#ff6b6b;

color:white;

cursor:pointer;

box-shadow:0 5px 0 #c0392b;

transition:.2s;

min-width:200px;

}



button:hover {

transform:scale(1.1) rotate(-3deg);

}



button:active {

transform:translateY(5px);

box-shadow:none;

}





@keyframes bounce {

0%,100% {

transform:translateY(0);

}

50% {

transform:translateY(-15px);

}

}



@keyframes shake {

0% {

transform:rotate(-3deg);

}

50% {

transform:rotate(3deg);

}

100% {

transform:rotate(-3deg);

}

}



@keyframes spin {

from {

transform:rotate(0deg);

}

to {

transform:rotate(360deg);

}

}





/* VERSION TELEPHONE */

@media(max-width:600px){


.page {

gap:20px;

padding:15px;

}



button {

width:80%;

max-width:300px;

}



#loadingBar {

font-size:18px;

}


}



</style>

</head>



<body>



<!-- PAGE 1 -->

<div class="page active" id="page1">


<h1>
👋 HI, how are you?? 😄
</h1>


<button onclick="goTo(2)">
Click on me 😏
</button>


</div>





<!-- PAGE 2 -->

<div class="page" id="page2">


<div class="emoji-big">
🤬💀🖕😂
</div>



<h1>
FUCK YOU !! 😂😂😂
</h1>



<button id="kidBtn" 
style="display:none;"
onclick="goTo('Loading')">

Just kidding 😜 click on me

</button>


</div>






<!-- LOADING -->

<div class="page" id="pageLoading">


<h1>
Loading... 🔄
</h1>


<div id="loadingBar">
░░░░░░░░░░ 0%
</div>


</div>






<!-- PAGE 3 -->


<div class="page" id="page3">


<div id="img3">

🤣🖕😹

</div>



<h1>
FUCK YOU AGAIN hhh 😂😂
</h1>



<button onclick="goTo(1)">
⬅ Go Back
</button>


</div>





<!-- SON -->

<audio id="laughSound" src="Haha.mp3"></audio>





<script>



function goTo(page){



document.querySelectorAll('.page')

.forEach(p=>p.classList.remove('active'));



document.getElementById('page'+page)

.classList.add('active');





if(page===2){


let kidBtn=document.getElementById('kidBtn');


kidBtn.style.display="none";


setTimeout(()=>{


kidBtn.style.display="inline-block";


},1000);



}





if(page==="Loading"){


runLoadingBar();


}





if(page===3){



let sound=document.getElementById("laughSound");


sound.currentTime=0;


sound.play().catch(()=>{});



}



}








function runLoadingBar(){



const bar=document.getElementById("loadingBar");



const steps=[


{percent:10,blocks:"█░░░░░░░░░"},


{percent:35,blocks:"███░░░░░░░"},


{percent:70,blocks:"███████░░░"},


{percent:100,blocks:"██████████"}



];



let i=0;



bar.textContent=
steps[0].blocks+" "+steps[0].percent+"%";




let interval=setInterval(()=>{


i++;



if(i>=steps.length){


clearInterval(interval);


setTimeout(()=>goTo(3),500);


return;


}



bar.textContent=
steps[i].blocks+" "+steps[i].percent+"%";



},700);



}




</script>


</body>
</html>
